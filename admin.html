<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>YRMS Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/admin.css">

</head>

<body>

<div class="container py-4">

    <h2 class="mb-4">
        لوحة الإدارة
    </h2>

    <div class="row g-3">

        <div class="col-md-3">

            <div class="card dashboard-card">

                <h3 id="doctorCount">0</h3>

                <p>عدد الأطباء</p>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card dashboard-card">

                <h3 id="clinicCount">0</h3>

                <p>عدد العيادات</p>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card dashboard-card">

                <h3 id="referralCount">0</h3>

                <p>الإحالات</p>

            </div>

        </div>

    </div>

    <hr class="my-5">

    <div class="d-grid gap-3">

        <button class="btn btn-warning btn-lg" id="addClinicBtn">
            إضافة عيادة
        </button>

        <button class="btn btn-dark btn-lg" id="addDoctorBtn">
            إضافة طبيب
        </button>

        <button class="btn btn-outline-dark btn-lg">
            قائمة الأطباء
        </button>

        <button class="btn btn-outline-dark btn-lg">
            قائمة الإحالات
        </button>

    </div>

</div>

<script type="module" src="js/admin.js"></script>

</body>

</html>
