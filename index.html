<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Yaseen Referral System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.rtl.min.css" rel="stylesheet">

    <!-- Cairo Font -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container py-4">

    <!-- Logo -->
    <div class="text-center mb-4">

        <img src="assets/logo/logo.png"
             class="logo mb-3"
             alt="Yaseen Logo">

        <h2 class="fw-bold">
            Yaseen Referral System
        </h2>

        <p class="text-secondary">
            نظام إحالة المرضى
        </p>

    </div>

    <!-- Doctor Card -->

    <div class="card shadow-sm border-0 rounded-4 mb-4">

        <div class="card-body">

            <small class="text-secondary">
                الطبيب المحول
            </small>

            <h4 id="doctorName" class="mt-2">
                جاري تحميل البيانات...
            </h4>

            <p id="clinicName" class="text-secondary mb-0">
                ...
            </p>

        </div>

    </div>

    <!-- Patient Information -->

    <div class="card shadow-sm border-0 rounded-4 mb-4">

        <div class="card-body">

            <h5 class="mb-4">
                بيانات المراجع
            </h5>

            <div class="mb-3">

                <label class="form-label">
                    الاسم الثلاثي *
                </label>

                <input
                    type="text"
                    class="form-control"
                    id="patientName">

            </div>

            <div class="mb-3">

                <label class="form-label">
                    العمر
                </label>

                <input
                    type="number"
                    class="form-control"
                    id="patientAge">

            </div>

            <div class="mb-3">

                <label class="form-label">
                    الجنس
                </label>

                <select
                    class="form-select"
                    id="patientGender">

                    <option>ذكر</option>
                    <option>أنثى</option>

                </select>

            </div>

            <div>

                <label class="form-label">
                    رقم الهاتف *
                </label>

                <input
                    type="tel"
                    class="form-control"
                    id="patientPhone">

            </div>

        </div>

    </div>

    <!-- X-Ray Types -->

    <div class="card shadow-sm border-0 rounded-4 mb-4">

        <div class="card-body">

            <h5 class="mb-4">

                نوع الأشعة

            </h5>

            <div id="xrayContainer">

            </div>

        </div>

    </div>

    <!-- Notes -->

    <div class="card shadow-sm border-0 rounded-4 mb-4">

        <div class="card-body">

            <h5 class="mb-3">

                ملاحظات

            </h5>

            <textarea
                id="notes"
                rows="5"
                class="form-control"></textarea>

        </div>

    </div>

    <!-- Submit -->

    <div class="d-grid">

        <button
            class="btn btn-warning btn-lg rounded-4"
            id="submitBtn">

            إرسال الطلب

        </button>

    </div>

</div>

<script src="./js/script.js"></script>

</body>

</html>
